{% extends "base.html" %}

{% block content %}
<section class="page-header">
    <h1>企業登録</h1>
    <a href="{{ url_for('companies.index') }}" class="btn btn-secondary">企業一覧へ戻る</a>
</section>
    <form method="post" novalidate>
        <div class="row g-4">
            <div class="col-12">
                <label for="company_name">企業名</label>
                <input type="text" id="company_name" name="company_name" required>
            </div>
            <div class="col-12">
                <label for="industry">業界</label>
                <input type="text" id="industry" name="industry" required>
            </div>
            <div class="col">
                <label for="location">所在地</label>
                    <input
            type="text"
            id="location"
            name="location"
            placeholder="東京都渋谷区"
                    >
            </div>
            <div class="col">
                <label for="memo">メモ</label>
                <textarea
                    id="memo"
                    name="memo"
                    rows="5"
                    placeholder="企業の特徴、気になる点、応募前に確認したいことなど"
                ></textarea>
            </div>
            <div class="form-acts">
                 <button type="submit" class="btn btn-primary">登録する</button>
        <a href="{{ url_for('companies.index') }}" class="btn btn-secondary">キャンセル</a>
            </div>
        </div>
    </form>
{% endblock %}
