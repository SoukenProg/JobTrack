<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="応募企業と面接予定を一元管理する就活支援システム">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script type="text/javascript" src="{{url_for('static', filename='js/main.js')}}"></script>
    <title>JobTrack</title>
</head>
<body>
    <header class="l-header p-header">
    <div class="p-header__inner">
      <a href="{{ url_for("dashboard.index") }}" class="p-header__title">
          JobTrack
      </a>
      <div class="p-header__hamburger">
        <button class="c-hamburger">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <nav class="p-header__nav p-nav">
        <div class="p-nav__inner">
          <ul class="p-nav__list">
            <li class="p-nav__item">
              <a href=" {{ url_for('dashboard.index') }}" class="p-nav__link">
                ダッシュボード
              </a>
            </li>
            <li class="p-nav__item">
              <a href="{{ url_for('companies.index') }}" class="p-nav__link">
                企業一覧
              </a>
            </li>
            <li class="p-nav__item">
              <a href="{{ url_for('companies.new') }}" class="p-nav__link">
                ＋ 企業を登録
              </a>
            </li>
          </ul>
        </div>
      </nav>
    </div>
  </header>
<main class="l-main">
  {% block content %}
  {% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-jdSIJTK9l6XwXj3RixpVDXtMcA2bFd9O81RlLAwhpr2oXRqvQP88rr16IeFXTgFE" crossorigin="anonymous"></script>
</body>
</html>
