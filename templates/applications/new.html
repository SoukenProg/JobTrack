{% extends "base.html" %}

{% block title %}応募情報登録{% endblock %}

{% block content %}
<div class="page-container">
    <section class="page-header">
        <div>
            <p class="page-description">APPLICATION</p>
            <h1>応募情報登録</h1>
            <p class="page-description">
                {{ company.company_name }} への応募情報を登録します。
            </p>
        </div>

        <a
            href="{{ url_for('companies.detail', company_id=company.id) }}"
            class="btn btn-secondary"
        >
            企業詳細へ戻る
        </a>
    </section>

    <form method="post" class="form-card">
        <div class="form-field">
            <label for="job_title" class="form-label">応募職種</label>
            <input
                type="text"
                id="job_title"
                name="job_title"
                class="form-control"
                placeholder="例：Webエンジニア"
                required
            >
        </div>

        <div class="form-field">
            <label for="application_route" class="form-label">応募経路</label>
            <select id="application_route" name="application_route" class="form-select">
                <option value="">選択してください</option>
                {% for route in application_routes %}
                    <option value="{{ route }}">{{ route }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-field">
            <label for="status" class="form-label">選考状況</label>
                <select id="status" name="status" class="form-select" required>
                    {% for status in application_statuses %}
                        <option value="{{ status }}">{{ status }}</option>
                    {% endfor %}
                </select>
</div>

        <div class="form-field">
            <label for="application_date" class="form-label">応募日</label>
            <input
                type="date"
                id="application_date"
                name="application_date"
                class="form-control"
            >
        </div>

        <div class="form-field">
            <label for="deadline" class="form-label">対応期限</label>
            <input
                type="date"
                id="deadline"
                name="deadline"
                class="form-control"
            >
        </div>

        <div class="form-field">
            <label for="salary" class="form-label">給与</label>
            <input
                type="text"
                id="salary"
                name="salary"
                class="form-control"
                placeholder="例：月給25万円〜"
            >
        </div>

        <div class="form-field">
            <label for="work_style" class="form-label">勤務形態</label>
            <input
                type="text"
                id="work_style"
                name="work_style"
                class="form-control"
                placeholder="例：出社、リモート、ハイブリッド"
            >
        </div>

        <div class="form-field">
            <label for="memo" class="form-label">応募メモ</label>
            <textarea
                id="memo"
                name="memo"
                class="form-control"
                rows="5"
                placeholder="応募理由、求人内容、気になる点など"
            ></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">登録する</button>
            <a
                href="{{ url_for('companies.detail', company_id=company.id) }}"
                class="btn btn-secondary"
            >
                キャンセル
            </a>
        </div>
    </form>
</div>
{% endblock %}
